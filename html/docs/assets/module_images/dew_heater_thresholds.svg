<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470">
  <defs>
    <style>
      .bg { fill: #fffdf8; }
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .body { font: 18px Arial, sans-serif; fill: #374151; }
      .small { font: 16px Arial, sans-serif; fill: #4b5563; }
      .axis { stroke: #111827; stroke-width: 3; }
      .tick { stroke: #6b7280; stroke-width: 2; }
      .risk { font: 700 18px Arial, sans-serif; fill: #991b1b; }
      .safe { font: 700 18px Arial, sans-serif; fill: #065f46; }
      .lineOn { stroke: #d97706; stroke-width: 4; }
      .lineOff { stroke: #059669; stroke-width: 4; }
      .lineFull { stroke: #dc2626; stroke-width: 4; }
      .labelBox { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 8; }
      .arrow { stroke: #6b7280; stroke-width: 2; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="470"/>

  <text class="title" x="60" y="55">Dew Heater Thresholds And Hysteresis</text>
  <text class="body" x="60" y="95">The dew margin is the difference between ambient temperature and dew point.</text>
  <text class="body" x="60" y="123">Small values mean the system is getting close to condensation, so the heater needs to work harder.</text>

  <line class="axis" x1="130" y1="250" x2="1070" y2="250"/>
  <line class="arrow" x1="1070" y1="250" x2="1110" y2="250"/>

  <text class="risk" x="120" y="220">More dew risk</text>
  <text class="safe" x="930" y="220">Safer</text>

  <line class="tick" x1="170" y1="235" x2="170" y2="265"/>
  <line class="tick" x1="290" y1="235" x2="290" y2="265"/>
  <line class="tick lineFull" x1="380" y1="215" x2="380" y2="285"/>
  <line class="tick lineOn" x1="620" y1="215" x2="620" y2="285"/>
  <line class="tick lineOff" x1="790" y1="215" x2="790" y2="285"/>
  <line class="tick" x1="980" y1="235" x2="980" y2="265"/>

  <text class="small" x="164" y="295">0</text>
  <text class="small" x="278" y="295">0.5</text>
  <text class="small" x="609" y="295">3.0</text>
  <text class="small" x="779" y="295">4.0</text>
  <text class="small" x="969" y="295">6.0</text>

  <text class="body" x="430" y="340">dew margin = ambient temperature - dew point</text>

  <rect class="labelBox" x="310" y="148" width="150" height="42"/>
  <text class="small" x="326" y="174">Full Heat Margin</text>

  <rect class="labelBox" x="538" y="145" width="165" height="42"/>
  <text class="small" x="554" y="171">Turn Heater On At</text>

  <rect class="labelBox" x="705" y="148" width="195" height="42"/>
  <text class="small" x="731" y="174">Turn Heater Off Above</text>

  <line class="arrow" x1="385" y1="190" x2="380" y2="212"/>
  <line class="arrow" x1="620" y1="187" x2="620" y2="212"/>
  <line class="arrow" x1="802" y1="190" x2="790" y2="212"/>

  <rect x="135" y="395" width="20" height="20" fill="#dc2626"/>
  <text class="small" x="165" y="410">Full heat starts here or below</text>

  <rect x="430" y="395" width="20" height="20" fill="#d97706"/>
  <text class="small" x="460" y="410">Heater turns on at or below this point</text>

  <rect x="790" y="395" width="20" height="20" fill="#059669"/>
  <text class="small" x="820" y="410">Heater turns off only above this point</text>
</svg>
